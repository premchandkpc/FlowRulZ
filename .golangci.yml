# FlowRulZ golangci-lint configuration
# Focus on catching real bugs, not style nits

run:
  timeout: 5m

output:
  formats:
    - format: colored-line-number
  print-linter-name: true

linters:
  enable:
    # Bug catchers
    - bodyclose         # unclosed HTTP response bodies
    - durationcheck     # time.Duration multiplication bugs
    - errcheck          # unchecked errors
    - exportloopref  # deprecated in Go 1.22+ (replaced by copyloopvar)
    - govet             # suspicious constructs
    - nilerr            # returning nil when err != nil
    - staticcheck       # comprehensive static analysis
    - unconvert         # unnecessary type conversions
    - unparam           # unused function parameters
    - wastedassign      # wasted assignments

    # Security
    - gosec             # security issues

    # Simplicity
    - gosimple          # simplification opportunities
    - ineffassign       # ineffectual assignments
    - unused            # unused code

    # Style (non-blocking in CI)
    - gofmt             # formatting
    - misspell          # spelling errors

linters-settings:
  errcheck:
    check-blank: false
    exclude-functions:
      - (io.Closer).Close
      - (net.Listener).Close

  gosec:
    excludes:
      - G104  # unhandled errors on Close (noisy)
      - G304  # file path from variable (expected)

  govet:
    enable-all: true
    disable:
      - fieldalignment  # too noisy for existing code

  staticcheck:
    checks:
      - all
      - -SA1019  # deprecated (some APIs are deprecated but still needed)

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
  exclude-dirs:
    - runtime
    - sdk
    - simulator
    - docs
    - e2e

  exclude-rules:
    # Test files can be more relaxed
    - path: _test\.go
      linters:
        - errcheck
        - gosec
        - unparam

    # Bridge/CGo files have specific patterns
    - path: bridge/
      linters:
        - gosec

    # pkg/ interfaces don't need all checks
    - path: pkg/
      linters:
        - errcheck
