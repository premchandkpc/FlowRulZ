# FlowRulZ golangci-lint configuration
# Focus on catching real bugs, not style nits

run:
  timeout: 5m

output:
  formats:
    - format: colored-line-number
  print-linter-name: true

linters:
  enable:
    # Bug catchers
    - bodyclose
    - durationcheck
    - errcheck
    - govet
    - nilerr
    - staticcheck
    - unconvert
    - unparam
    - wastedassign

    # Security
    - gosec

    # Simplicity
    - gosimple
    - ineffassign
    - unused

    # Style
    - gofmt
    - misspell

linters-settings:
  errcheck:
    check-blank: false
    exclude-functions:
      - (io.Closer).Close
      - (net.Listener).Close
      - (*encoding/json.Encoder).Encode
      - os.Rename
      - os.Remove
      - os.MkdirAll

  gosec:
    excludes:
      - G104   # unhandled errors on Close/Remove/Rename (noisy)
      - G112   # Slowloris (handled in production http.Server config)
      - G114   # net/http serve without timeouts (dev tooling only)
      - G115   # integer overflow conversions (mostly safe in context)
      - G304   # file path from variable (expected)
      - G404   # math/rand for load balancing (not crypto)

  govet:
    enable-all: true
    disable:
      - fieldalignment
      - shadow     # too noisy for existing code

  staticcheck:
    checks:
      - all
      - -SA1019

  unparam:
    check-exported: false

issues:
  max-issues-per-linter: 50
  max-same-issues: 5

  exclude-rules:
    # Test files can be more relaxed
    - path: _test\.go
      linters:
        - errcheck
        - gosec
        - unparam
        - govet

    # Bridge/CGo files
    - path: bridge/
      linters:
        - gosec

    # pkg/ interfaces
    - path: pkg/
      linters:
        - errcheck

    # Bootstrap/builder (internal wiring, some unused types for future use)
    - path: bootstrap/
      linters:
        - unused
        - unparam

    # Gossip is fire-and-forget by design
    - path: gossip\.go
      linters:
        - errcheck

    # Lifecycle Start/Stop return errors for flexibility but callers ignore
    - path: lifecycle\.go
      linters:
        - errcheck

    # Recovery/execute_plan: DLQ.Send is best-effort, body param unused
    - path: execute_plan\.go
      linters:
        - errcheck
        - unparam

    # Service caller: TCP deadline errors are non-critical
    - path: service_caller\.go
      linters:
        - errcheck

    # State recovery: Save/Delete failures logged but not fatal
    - path: recovery\.go
      linters:
        - errcheck

    # Cluster publish is best-effort
    - path: cluster\.go
      linters:
        - errcheck

    # prod.go lifecycle Stop errors
    - path: prod\.go
      linters:
        - errcheck

    # main.go shutdown
    - path: cmd/
      linters:
        - errcheck

    # Parser/LSP/lexer interface implementation signatures (params mandated by interface)
    - path: flow/(parser|lsp|lexer)\.go
      linters:
        - unparam

    # Node interface implementation signatures
    - path: node/(http|service_caller)\.go
      linters:
        - unparam

    # Bridge/CGo FFI result always nil
    - path: engine/pkgsupport\.go
      linters:
        - unparam
