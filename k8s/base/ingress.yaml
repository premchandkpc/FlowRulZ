apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: flowrulz
  namespace: flowrulz
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: flowrulz.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: flowrulz
                port:
                  number: 8080
          - path: /health
            pathType: Exact
            backend:
              service:
                name: flowrulz
                port:
                  number: 8080
    - host: sim.flowrulz.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sim
                port:
                  number: 8081
