apiVersion: v1
kind: Service
metadata:
  name: sim
  namespace: flowrulz
  labels:
    app: sim
spec:
  ports:
    - port: 8081
      targetPort: 8081
      name: http
  selector:
    app: sim
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sim
  namespace: flowrulz
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sim
  template:
    metadata:
      labels:
        app: sim
    spec:
      containers:
        - name: sim
          image: flowrulz:latest
          imagePullPolicy: IfNotPresent
          args:
            - "--interactive"
            - "--dashboard-addr=:8081"
            - "--nodes=3"
          ports:
            - containerPort: 8081
              name: dashboard
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
