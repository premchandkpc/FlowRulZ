apiVersion: v1
kind: Service
metadata:
  name: flowrulz
  namespace: flowrulz
  labels:
    app: flowrulz
spec:
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  selector:
    app: flowrulz
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flowrulz
  namespace: flowrulz
spec:
  replicas: 3
  selector:
    matchLabels:
      app: flowrulz
  template:
    metadata:
      labels:
        app: flowrulz
    spec:
      imagePullSecrets:
        - name: registry-credentials
      initContainers:
        - name: wait-for-kafka
          image: confluentinc/cp-kafka:7.6.0
          command:
            - sh
            - -c
            - until kafka-topics --bootstrap-server kafka:9092 --list >/dev/null 2>&1; do echo "waiting for kafka"; sleep 2; done
      containers:
        - name: flowrulz
          image: flowrulz:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: flowrulz-config
          env:
            - name: FLOWRULZ_KAFKA_BROKERS
              value: kafka:9092
            - name: FLOWRULZ_KAFKA_GROUP_ID
              value: flowrulz
            - name: FLOWRULZ_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: FLOWRULZ_HTTP_ADDR
              value: ":8080"
            - name: FLOWRULZ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: flowrulz-api-key
                  key: key
                  optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
