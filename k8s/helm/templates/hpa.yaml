{{- if .Values.flowrulz.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: flowrulz
  namespace: {{ include "flowrulz.namespace" . }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: flowrulz
  minReplicas: {{ .Values.flowrulz.hpa.minReplicas }}
  maxReplicas: {{ .Values.flowrulz.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.flowrulz.hpa.cpuAverageUtilization }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.flowrulz.hpa.memoryAverageUtilization }}
{{- end }}
