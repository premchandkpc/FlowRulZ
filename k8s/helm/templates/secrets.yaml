apiVersion: v1
kind: Secret
metadata:
  name: flowrulz-api-key
  namespace: {{ include "flowrulz.namespace" . }}
type: Opaque
stringData:
  {{- if .Values.flowrulz.apiKey }}
  key: {{ .Values.flowrulz.apiKey | quote }}
  {{- else }}
  {{- fail "flowrulz.apiKey must be set in values" }}
  {{- end }}
